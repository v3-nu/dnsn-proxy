name: Build and Publish Packages

on:
  push:
    tags: ["*.*.*"]


jobs:
  build:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install go
      uses: actions/setup-go@v2
      with:
        go-version: 1.26.1
      id: go
    
    - name: Login to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Goreleaser
      uses: goreleaser/goreleaser-action@v2
      with:
        version: ${{ github.event.release.tag.name }}
        args: release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_DEBPKG_SECRET: ${{ secrets.PACKAGE_REGISTRY_SECRET }}
        UPLOAD_APKPKG_SECRET: ${{ secrets.PACKAGE_REGISTRY_SECRET }}
        UPLOAD_RPMPKG_SECRET: ${{ secrets.PACKAGE_REGISTRY_SECRET }}
    
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          README.md
          dist/**